name: Windows Harness

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness:
    name: Deterministic harness
    runs-on: windows-2025-vs2026
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Build UIA helper
        run: dotnet build resources/win-uia-helper/WinChronicle.UiaHelper.csproj --nologo

      - name: Build UIA watcher
        run: dotnet build resources/win-uia-watcher/WinChronicle.UiaWatcher.csproj --nologo

      - name: Run deterministic harness
        run: python harness/scripts/run_harness.py

      - name: Check whitespace
        run: git diff --check
