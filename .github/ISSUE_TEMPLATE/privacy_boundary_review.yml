name: Privacy boundary review
description: Review proposals that may touch capture, storage, privacy, MCP, memory, or release evidence contracts.
title: "[privacy] "
labels: ["privacy", "scope-review"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for `Privacy-boundary review` work before implementation.
        This review classifies risk; it is not approval to implement.
        Reading `docs/codex-long-term-goal.md` gives direction only; it is not
        release authorization, not automatic maintenance authorization, and
        not approval for broad evidence sweeps, release or publish actions, or
        capture-surface expansion.
        Before implementation, read `AGENTS.md`, `docs/roadmap.md`,
        `README.md`, `docs/codex-long-term-goal.md`, and the files, tests,
        fixtures, schemas, scorecards, or docs affected by the task.

        Open this before implementation when a proposal may affect capture
        surfaces, privacy behavior, schema shape, CLI/MCP JSON shape,
        helper/watcher behavior, storage, memory output, or release evidence.
        If the work is deterministic docs, tests, fixtures, scorecards, CI, or
        compatible metadata that does not touch privacy surfaces, use the
        harness-first task template.

        If the proposal requires runtime expansion, new capture surfaces,
        release or publish actions, broad evidence sweeps, or continuation of
        the closed maintenance loop, stop for explicit human product approval.
        Do not attach or paste observed-content artifacts.
  - type: textarea
    id: surface
    attributes:
      label: Surface under review
      description: Name the contract, command, MCP tool, helper/watcher path, storage path, memory output, scorecard, or release evidence affected.
    validations:
      required: true
  - type: textarea
    id: mcp_output_impact
    attributes:
      label: MCP output impact
      description: If this touches MCP output, name whether it affects result examples, compatible metadata, schema conditions, or the fixed read-only tool list. State `No MCP output impact` if none.
      placeholder: |
        Result examples:
        Compatible metadata:
        Schema conditions:
        Fixed read-only tool list:
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Privacy or scope risk
      description: Describe the risk without including observed content, secrets, passwords, screenshots, OCR output, raw helper JSON, or raw watcher JSONL.
    validations:
      required: true
  - type: textarea
    id: tests_first_plan
    attributes:
      label: Tests-first plan
      description: List the contracts, fixtures, tests, scorecards, or docs that should change before behavior changes.
    validations:
      required: true
  - type: checkboxes
    id: prohibited_surfaces
    attributes:
      label: Prohibited surface confirmation
      options:
        - label: This review does not authorize screenshot capture, OCR, audio recording, keyboard capture, clipboard capture, network upload, LLM calls, desktop control, daemon/service install, polling capture, default background capture, MCP write tools, arbitrary file reads, or product targeted capture.
          required: true
        - label: This review will not include committed observed-content artifacts.
          required: true
