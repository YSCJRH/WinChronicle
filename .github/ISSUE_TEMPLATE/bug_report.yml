name: Bug report
description: Report a reproducible WinChronicle bug without attaching observed-content artifacts.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste observed screen text,
        screenshots, OCR output, raw helper JSON, raw watcher JSONL, secrets,
        passwords, local page contents, or editor buffer contents.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use deterministic fixtures or sanitized commands whenever possible.
      placeholder: |
        1. python -m winchronicle ...
        2. ...
        3. Expected ...
        4. Actual ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, Python version, .NET SDK/runtime version, WinChronicle commit or version.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation attempted
      description: List tests, harness commands, or manual smoke commands you ran.
      placeholder: |
        - python -m pytest -q
        - python harness/scripts/run_harness.py
        - git diff --check
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not attach or paste observed-content artifacts, screenshots, OCR output, secrets, passwords, raw helper JSON, or raw watcher JSONL.
          required: true
        - label: This report does not request screenshots, OCR, audio, keyboard capture, clipboard capture, cloud upload, desktop control, or MCP write tools.
          required: true
